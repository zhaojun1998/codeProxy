name: Rebuild private CliRelay image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rebuild-private-clirelay-image
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend image build
        env:
          GH_TOKEN: ${{ secrets.CLIRELAY_WORKFLOW_TOKEN }}
          CLIRELAY_REPOSITORY: ${{ github.repository_owner }}/CliRelay
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "CLIRELAY_WORKFLOW_TOKEN must allow Actions write access to ${CLIRELAY_REPOSITORY}." >&2
            exit 1
          fi
          gh workflow run private-image.yml \
            --repo "${CLIRELAY_REPOSITORY}" \
            --ref main \
            -f frontend_ref=main
