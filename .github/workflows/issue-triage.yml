name: Issue triage agent

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to triage
        required: true

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issues' && !github.event.issue.pull_request) ||
        (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot')
      }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL || 'https://relay.07230805.xyz/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
      TRIAGE_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: python3 scripts/issue_triage_agent.py
