name: Rebuild CliRelay Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CliRelay docker publish workflow
        env:
          GH_TOKEN: ${{ secrets.CLIRELAY_WORKFLOW_TOKEN }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "CLIRELAY_WORKFLOW_TOKEN secret is required to trigger CliRelay docker builds." >&2
            exit 1
          fi

          gh workflow run docker-publish.yml \
            --repo kittors/CliRelay \
            --ref "${TARGET_REF}"

          echo "Triggered CliRelay docker-publish.yml for ${TARGET_REF}"
